syntax = "proto3";

option csharp_namespace = "Forkly.Api.Grpc";

package auth;

import "google/protobuf/empty.proto";

// gRPC face of the auth service. Mirrors the REST endpoints in AuthController;
// both delegate to the same IAccountService.
service AuthService {
  rpc Register (RegisterMsg) returns (AuthReply);
  rpc Login (LoginMsg) returns (AuthReply);
  // Requires a valid JWT in the "authorization: Bearer <token>" metadata.
  rpc GetCurrentUser (google.protobuf.Empty) returns (UserReply);
}

message RegisterMsg {
  string full_name = 1;
  string email = 2;
  string password = 3;
}

message LoginMsg {
  string email = 1;
  string password = 2;
}

message UserReply {
  string id = 1;
  string email = 2;
  string full_name = 3;
  repeated string roles = 4;
}

message AuthReply {
  string token = 1;
  // ISO-8601 / RFC-3339 timestamp string.
  string expires_at = 2;
  UserReply user = 3;
}
