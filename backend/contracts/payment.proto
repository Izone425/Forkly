syntax = "proto3";

option csharp_namespace = "Forkly.Contracts.Payment";
package forkly.payment.v1;

// Payment service — OWNED BY the payment team (separate branch/PIC).
// The Order service is a CLIENT: when a customer confirms, Order calls
// CreatePayment and returns the redirect_url so the frontend can navigate to
// the payment page. Until the real service exists, Order uses a mock.
service PaymentService {
  rpc CreatePayment (CreatePaymentRequest) returns (CreatePaymentResponse);
  rpc GetPayment (GetPaymentRequest) returns (Payment);
}

message PaymentLine {
  string name = 1;
  int32 unit_price_cents = 2;
  int32 quantity = 3;
}

message CreatePaymentRequest {
  string order_id = 1;
  int32 amount_cents = 2;
  string currency = 3; // ISO 4217, e.g. "MYR"
  repeated PaymentLine lines = 4;
}

message CreatePaymentResponse {
  string payment_id = 1;
  // Where the frontend should send the customer to pay (the payment page).
  string redirect_url = 2;
  string status = 3; // e.g. "PENDING"
}

message GetPaymentRequest {
  string payment_id = 1;
}

message Payment {
  string payment_id = 1;
  string order_id = 2;
  int32 amount_cents = 3;
  string status = 4; // PENDING | PAID | FAILED
}
