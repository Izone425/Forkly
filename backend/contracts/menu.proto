syntax = "proto3";

option csharp_namespace = "Forkly.Contracts.Menu";
package forkly.menu.v1;

// Menu service — OWNED BY the menu team (amirul-menu).
// The Order service is a CLIENT of this contract. Until the real service
// exists, Order uses a mock that returns the same shape.
service MenuService {
  // Full menu (optionally filtered later).
  rpc GetMenu (GetMenuRequest) returns (GetMenuResponse);
  // A single item — used by Order to price/validate a cart line.
  rpc GetItem (GetItemRequest) returns (MenuItem);
  // Finalise a checkout: permanently decrement stock for each line and clear the
  // ordering session's cart holds. Atomic — either every line commits or none do.
  rpc CommitStock (CommitStockRequest) returns (CommitStockResponse);
}

message GetMenuRequest {}

message GetItemRequest {
  string id = 1;
}

message MenuItem {
  string id = 1;
  string name = 2;
  string description = 3;
  // Price in the smallest currency unit (cents). RM10.00 -> 1000.
  // Integer money avoids floating-point rounding across services.
  int32 price_cents = 4;
  string category = 5;
  string emoji = 6;
  bool available = 7;
}

message GetMenuResponse {
  repeated MenuItem items = 1;
}

message CommitStockLine {
  int32 menu_id = 1;
  int32 quantity = 2;
}

message CommitStockRequest {
  // Cart/session that placed the order — its holds for these items are cleared.
  string session_id = 1;
  repeated CommitStockLine items = 2;
}

message CommitStockResponse {
  bool committed = 1;
  int32 failed_menu_id = 2;  // 0 when committed
  int32 available = 3;       // stock left for the failed item
}
