syntax = "proto3";

option csharp_namespace = "Forkly.Contracts.Order";
package forkly.order.v1;

// Order service — OWNED BY us (this project).
// Exposed over gRPC so OTHER backends (e.g. payment, kitchen) can read/create
// orders backend-to-backend. The browser talks to the REST API instead.
service OrderService {
  rpc GetOrder (GetOrderRequest) returns (Order);
  rpc CreateOrder (CreateOrderRequest) returns (Order);
}

message OrderItemInput {
  string id = 1;
  int32 quantity = 2;
}

message CreateOrderRequest {
  repeated OrderItemInput items = 1;
}

message GetOrderRequest {
  string order_id = 1;
}

message OrderItem {
  string id = 1;
  string name = 2;
  int32 unit_price_cents = 3;
  int32 quantity = 4;
}

message Order {
  string order_id = 1;
  repeated OrderItem items = 2;
  int32 subtotal_cents = 3;
  int32 tax_cents = 4;
  int32 total_cents = 5;
  string status = 6; // CREATED | AWAITING_PAYMENT | PAID | CANCELLED
  string payment_id = 7;
  string payment_redirect_url = 8;
}
